<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Print Specific Section</title>
    <style>
        /* Your regular styles */
        .content { padding: 20px; border: 1px solid #ccc; }
        #print-button { padding: 10px 20px; background-color: skyblue; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div id="content-to-print" class="content">
        <h1>University GPA Document</h1>
        <p>Name: John Doe</p>
        <p>Student ID: 12345</p>
        <p>GPA: 3.75</p>
    </div>

    <button id="print-button">Print GPA</button>

    <script>
        document.getElementById('print-button').addEventListener('click', function () {
            printDiv('content-to-print');
        });

        function printDiv(divId) {
            // Get the content you want to print
            var content = document.getElementById(divId).innerHTML;

            // Open a new window
            var printWindow = window.open('', '', 'height=600,width=800');

            // Write the content to the new window
            printWindow.document.write('<html><head><title>Print</title></head><body>');
            printWindow.document.write(content);
            printWindow.document.write('</body></html>');

            // Wait for the content to load and then print
            printWindow.document.close(); // Close the document stream
            printWindow.print(); // Trigger print dialog
        }
    </script>

</body>
</html>
